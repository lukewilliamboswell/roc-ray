name: CI

on:
  pull_request:

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15         # arm64mac
          - ubuntu-22.04     # x64glibc
          - windows-2022     # x64win
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2.0.5
        with:
          version: 0.16.0

      - name: Build Roc from pinned commit
        run: ci/build_roc.sh

      - name: Build platform
        run: zig build

      - name: Run Zig tests
        # Native tests require MSVC libraries on Windows which aren't available in CI
        if: runner.os != 'Windows'
        run: zig build test -Droc-tests=false

      - name: Bundle platform
        run: ./bundle.sh

      - name: Test Wayland bundle package
        if: runner.os == 'Linux'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          import ci.all_tests as tests

          root = Path(".").resolve()
          failures = tests.run_wayland_bundle_test(root, root / "examples/hello_world.roc", False)
          if failures:
              for failure in failures:
                  print(f"FAILED: {failure}")
              raise SystemExit(1)
          PY

      - name: Start HTTP server for bundle
        run: |
          python3 -m http.server 8000 &
          sleep 3

          BUNDLE_FILE=$(ls *.tar.zst 2>/dev/null | head -1)
          if [ -z "$BUNDLE_FILE" ]; then
            echo "Error: No bundle file found"
            exit 1
          fi

          if ! curl -sf "http://localhost:8000/$BUNDLE_FILE" -o /dev/null; then
            echo "Error: Bundle not accessible at http://localhost:8000/$BUNDLE_FILE"
            exit 1
          fi
          echo "Bundle accessible at http://localhost:8000/$BUNDLE_FILE"

          echo "BUNDLE_URL=http://localhost:8000/$BUNDLE_FILE" >> "$GITHUB_ENV"

      - name: Update examples to use bundled platform
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          from ci.all_tests import _rewrite_platform_ref

          replacement = f'"{os.environ["BUNDLE_URL"]}"'
          for example in sorted(Path("examples").glob("*.roc")):
              original = example.read_text()
              rewritten, did_rewrite = _rewrite_platform_ref(original, replacement)
              if did_rewrite:
                  print(f"Updating: {example}")
                  example.write_text(rewritten)
              else:
                  print(f"Skipping: {example} (no platform reference)")
          PY

      - name: Run Roc check/fmt
        # Skip on Windows - roc executable PATH issues and MSVC requirements
        # roc test is blocked on roc-lang/roc#9752 in the pinned compiler
        if: runner.os != 'Windows'
        run: python3 ci/all_tests.py --skip-build --skip-bundle-test --skip-roc-test

      - name: Build and run examples headlessly
        # Linux covers headless runtime; macOS currently hangs in generated executables
        # and Windows has roc executable PATH issues plus MSVC requirements.
        if: runner.os == 'Linux'
        run: python3 ci/all_tests.py --runtime-only --skip-bundle-test
