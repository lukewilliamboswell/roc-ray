name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-bundle:
    name: Build and Bundle Platform
    runs-on: ubuntu-22.04
    outputs:
      bundle_filename: ${{ steps.bundle.outputs.bundle_filename }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2.0.5
        with:
          version: 0.16.0

      - name: Build Roc from pinned commit
        run: ci/build_roc.sh

      - name: Build platform
        run: zig build -Doptimize=ReleaseSafe

      - name: Run tests
        run: zig build test -Droc-tests=false

      - name: Bundle platform
        id: bundle
        run: |
          ./bundle.sh

          BUNDLE_FILE=$(ls *.tar.zst 2>/dev/null | head -1)
          if [ -z "$BUNDLE_FILE" ]; then
            echo "Error: No bundle file found"
            exit 1
          fi

          echo "Bundle created: $BUNDLE_FILE"
          echo "bundle_filename=$BUNDLE_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-bundle
          path: ${{ steps.bundle.outputs.bundle_filename }}
          retention-days: 30

  test-bundle:
    name: Test Bundle (${{ matrix.os }})
    needs: build-and-bundle
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15         # arm64mac
          - ubuntu-24.04     # x64glibc
          - windows-2022     # x64win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2.0.5
        with:
          version: 0.16.0

      - name: Build Roc from pinned commit
        run: ci/build_roc.sh

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-bundle

      - name: Test bundled platform with examples
        run: python3 ci/test_bundle_artifact.py "${{ needs.build-and-bundle.outputs.bundle_filename }}"

  create-release:
    name: Create GitHub Release
    needs: [build-and-bundle, test-bundle]
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-bundle

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUNDLE_FILE="${{ needs.build-and-bundle.outputs.bundle_filename }}"
          ROC_COMMIT=$(python3 ci/get_roc_commit.py | cut -c1-8)

          gh release create "${{ github.event.inputs.release_tag }}" \
            "$BUNDLE_FILE" \
            --title "${{ github.event.inputs.release_tag }}" \
            --generate-notes \
            --notes "Platform bundle built with Zig 0.16.0 and Roc ${ROC_COMMIT}

            Download the bundle and use it as a Roc platform:
            \`\`\`roc
            platform \"https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.release_tag }}/${BUNDLE_FILE}\"
            \`\`\`"
